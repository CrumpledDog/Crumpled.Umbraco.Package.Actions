name: 'Update Version Files'
description: 'Updates version numbers in umbraco-package.json, package.manifest, and related files'
author: 'Crumpled'

inputs:
  semver:
    description: 'Semantic version to set (e.g., 1.0.0-alpha.1)'
    required: true
  path-to-extension:
    description: 'Path to the extension directory (e.g., src/Extension)'
    required: true

outputs:
  file-version:
    description: 'The numeric file version (e.g., 1.0.0.1)'
    value: ${{ steps.update.outputs.file-version }}

runs:
  using: 'composite'
  steps:
    - name: Update version files
      id: update
      shell: bash
      run: |
        set -e
        
        SEMVER="${{ inputs.semver }}"
        PATH_TO_EXTENSION="${{ inputs.path-to-extension }}"
        
        if [ -z "$SEMVER" ] || [ -z "$PATH_TO_EXTENSION" ]; then
          echo "Error: Missing required arguments"
          echo "SEMVER: '$SEMVER'"
          echo "PATH_TO_EXTENSION: '$PATH_TO_EXTENSION'"
          exit 1
        fi
        
        echo "Updating version to $SEMVER in $PATH_TO_EXTENSION"
        
        # Update Client/public/umbraco-package.json if it exists
        if [ -f "$PATH_TO_EXTENSION/Client/public/umbraco-package.json" ]; then
          jq '.version = "'"$SEMVER"'"' "$PATH_TO_EXTENSION/Client/public/umbraco-package.json" > temp.json && mv temp.json "$PATH_TO_EXTENSION/Client/public/umbraco-package.json"
          echo "Updated version in $PATH_TO_EXTENSION/Client/public/umbraco-package.json to $SEMVER"
        fi
        
        # Update Client/package.json if it exists
        if [ -f "$PATH_TO_EXTENSION/Client/package.json" ]; then
          jq '.version = "'"$SEMVER"'"' "$PATH_TO_EXTENSION/Client/package.json" > temp2.json && mv temp2.json "$PATH_TO_EXTENSION/Client/package.json"
          echo "Updated version in $PATH_TO_EXTENSION/Client/package.json to $SEMVER"
        fi
        
        # Update package.json if it exists (but not if Client version exists)
        if [ -f "$PATH_TO_EXTENSION/package.json" ] && [ ! -f "$PATH_TO_EXTENSION/Client/package.json" ]; then
          jq '.version = "'"$SEMVER"'"' "$PATH_TO_EXTENSION/package.json" > temp2.json && mv temp2.json "$PATH_TO_EXTENSION/package.json"
          echo "Updated version in $PATH_TO_EXTENSION/package.json to $SEMVER"
        fi
        
        # Update umbraco-package.json if it exists (but not if Client version exists)
        if [ -f "$PATH_TO_EXTENSION/wwwroot/umbraco-package.json" ] && [ ! -f "$PATH_TO_EXTENSION/Client/public/umbraco-package.json" ]; then
          jq '.version = "'"$SEMVER"'"' "$PATH_TO_EXTENSION/wwwroot/umbraco-package.json" > temp.json && mv temp.json "$PATH_TO_EXTENSION/wwwroot/umbraco-package.json"
          echo "Updated version in $PATH_TO_EXTENSION/wwwroot/umbraco-package.json to $SEMVER"
        fi
        
        # Update package.manifest if it exists (Umbraco v13)
        PACKAGE_MANIFEST=""
        if [ -f "$PATH_TO_EXTENSION/wwwroot/package.manifest" ]; then
          PACKAGE_MANIFEST="$PATH_TO_EXTENSION/wwwroot/package.manifest"
        else
          # Search for package.manifest in App_Plugins for non-RCL projects
          FOUND_MANIFEST=$(find "$PATH_TO_EXTENSION" -name "package.manifest" -type f 2>/dev/null | head -n 1)
          if [ -n "$FOUND_MANIFEST" ]; then
            PACKAGE_MANIFEST="$FOUND_MANIFEST"
          fi
        fi
        
        if [ -n "$PACKAGE_MANIFEST" ]; then
          jq '.version = "'"$SEMVER"'"' "$PACKAGE_MANIFEST" > temp.json && mv temp.json "$PACKAGE_MANIFEST"
          echo "Updated version in $PACKAGE_MANIFEST to $SEMVER"
        fi
        
        # Convert semantic version to numeric file version (e.g., 1.0.0-alpha.1 -> 1.0.0.1)
        if [[ $SEMVER == *"-"* ]]; then
          BASE_VERSION=$(echo "$SEMVER" | cut -d'-' -f1)
          PRERELEASE=$(echo "$SEMVER" | cut -d'-' -f2)
          # Extract number from prerelease (e.g., alpha.1 -> 1, beta.2 -> 2)
          PRERELEASE_NUM=$(echo "$PRERELEASE" | grep -o '[0-9]\+$' || echo "0")
          FILE_VERSION="${BASE_VERSION}.${PRERELEASE_NUM}"
        else
          # Stable release: Find highest pre-release number for this version and add 1
          BASE_VERSION="$SEMVER"
          # Get all tags matching this version with pre-release suffix
          MAX_PRERELEASE=$(git tag -l "v${BASE_VERSION}-*" | grep -o '[0-9]\+$' | sort -n | tail -1)
          if [ -z "$MAX_PRERELEASE" ]; then
            # No pre-releases found, use 1
            FILE_VERSION="${BASE_VERSION}.1"
          else
            # Use max pre-release number + 1
            NEXT_NUM=$((MAX_PRERELEASE + 1))
            FILE_VERSION="${BASE_VERSION}.${NEXT_NUM}"
          fi
        fi
        
        echo "Version update completed successfully"
        echo "SEMVER=$SEMVER"
        echo "FILE_VERSION=$FILE_VERSION"
        
        echo "file-version=$FILE_VERSION" >> $GITHUB_OUTPUT
